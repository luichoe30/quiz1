<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Quiz — Deontología del Auditor Informático</title>
<style>
  :root {
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --purple-dark: #3C3489;
    --green-bg: #EAF3DE;
    --green-border: #639922;
    --green-text: #27500A;
    --red-bg: #FCEBEB;
    --red-border: #A32D2D;
    --red-text: #501313;
    --gray-bg: #F1EFE8;
    --text: #1a1a1a;
    --text-muted: #666;
    --border: #e0e0e0;
    --surface: #fff;
    --page-bg: #f8f7f5;
    --badge-s1-bg: #E6F1FB; --badge-s1: #0C447C;
    --badge-s2-bg: #EAF3DE; --badge-s2: #27500A;
    --badge-s3-bg: #FAEEDA; --badge-s3: #633806;
    --badge-s4-bg: #FBEAF0; --badge-s4: #72243E;
    --badge-s5-bg: #EEEDFE; --badge-s5: #3C3489;
    --badge-lect-bg: #F1EFE8; --badge-lect: #444441;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --text: #f0f0f0;
      --text-muted: #aaa;
      --border: #333;
      --surface: #1e1e1e;
      --page-bg: #121212;
      --purple-light: #2a2560;
      --gray-bg: #2a2a2a;
      --green-bg: #1a2e10; --green-text: #90c060; --green-border: #3a6d11;
      --red-bg: #2e1010; --red-text: #f09595; --red-border: #791f1f;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--page-bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); min-height: 100vh; }
  body { padding: 0; }

  #app { max-width: 480px; margin: 0 auto; padding: 16px; }

  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .header-icon { width: 36px; height: 36px; background: var(--purple-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header-icon svg { width: 18px; height: 18px; fill: var(--purple); }
  .header-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .header-sub { font-size: 12px; color: var(--text-muted); }

  .card { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); padding: 16px; margin-bottom: 14px; }

  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.3px; }
  .badge-s1 { background: var(--badge-s1-bg); color: var(--badge-s1); }
  .badge-s2 { background: var(--badge-s2-bg); color: var(--badge-s2); }
  .badge-s3 { background: var(--badge-s3-bg); color: var(--badge-s3); }
  .badge-s4 { background: var(--badge-s4-bg); color: var(--badge-s4); }
  .badge-s5 { background: var(--badge-s5-bg); color: var(--badge-s5); }
  .badge-lect { background: var(--badge-lect-bg); color: var(--badge-lect); }
  .badge-purple { background: var(--purple-light); color: var(--purple-dark); }

  .prog-bar { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 6px; }
  .prog-fill { height: 6px; border-radius: 3px; background: var(--purple); transition: width 0.35s ease; }
  .prog-label { font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between; }

  .q-text { font-size: 16px; font-weight: 500; line-height: 1.5; color: var(--text); margin: 12px 0 16px; }

  .opt { display: block; width: 100%; text-align: left; padding: 14px 16px; margin-bottom: 10px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--surface); color: var(--text); font-size: 15px; cursor: pointer; line-height: 1.4; transition: background 0.15s, border-color 0.15s, transform 0.1s; font-family: inherit; -webkit-appearance: none; }
  .opt:active:not(:disabled) { transform: scale(0.98); }
  .opt.correct { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); font-weight: 500; }
  .opt.wrong { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); }
  .opt.show-correct { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); font-weight: 500; }
  .opt:disabled { cursor: default; }

  .feedback { font-size: 14px; color: var(--text-muted); padding: 12px 14px; border-radius: 10px; background: var(--gray-bg); border-left: 3px solid var(--purple); line-height: 1.55; margin: 4px 0 14px; }
  .feedback.ok { border-left-color: var(--green-border); }
  .feedback.fail { border-left-color: var(--red-border); }

  .btn { display: block; width: 100%; padding: 15px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--surface); color: var(--text); font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; text-align: center; margin-bottom: 10px; transition: background 0.15s, transform 0.1s; -webkit-appearance: none; }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: var(--purple); border-color: var(--purple); color: #fff; }
  .btn.primary:active { background: var(--purple-dark); }
  .btn.outline-purple { border-color: var(--purple); color: var(--purple); }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-item { text-align: center; padding: 12px 8px; background: var(--gray-bg); border-radius: 10px; }
  .stat-num { font-size: 24px; font-weight: 700; color: var(--purple); }
  .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.3; }

  .filter-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .filter-btn { padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--text-muted); font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; font-family: inherit; transition: all 0.15s; -webkit-appearance: none; }
  .filter-btn.active { background: var(--purple-light); border-color: var(--purple); color: var(--purple-dark); }
  .filter-btn:active { transform: scale(0.97); }

  .score-circle { width: 100px; height: 100px; border-radius: 50%; background: var(--purple-light); border: 4px solid var(--purple); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 16px; }
  .score-big { font-size: 28px; font-weight: 700; color: var(--purple); line-height: 1; }
  .score-pct { font-size: 13px; color: var(--purple-dark); }

  .breakdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
  .bk-item { padding: 10px 12px; background: var(--gray-bg); border-radius: 10px; }
  .bk-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
  .bk-val { font-size: 18px; font-weight: 600; color: var(--text); }

  .review-section { margin-top: 16px; }
  .review-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
  .review-item { padding: 12px 14px; margin-bottom: 10px; border-radius: 10px; background: var(--red-bg); border: 1px solid var(--red-border); }
  .review-q { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
  .review-ans { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .review-correct { color: var(--green-text); font-weight: 500; }

  .msg-box { text-align: center; padding: 12px 16px; border-radius: 10px; font-size: 14px; font-weight: 500; margin-bottom: 16px; }
  .msg-great { background: var(--green-bg); color: var(--green-text); }
  .msg-good { background: var(--purple-light); color: var(--purple-dark); }
  .msg-ok { background: #FAEEDA; color: #633806; }
  .msg-low { background: var(--red-bg); color: var(--red-text); }

  .section-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const Q = [
  {s:"s1",t:"Sesión 1",q:"Según Lawrence B. Sawyer (1985), ¿qué evalúa principalmente una auditoría?",opts:["A. La rentabilidad financiera de la empresa","B. Si se siguen políticas aceptables, normas establecidas y se utilizan recursos eficientemente","C. Solo el cumplimiento de normativas legales","D. La satisfacción de los empleados"],c:1,exp:"Sawyer define la auditoría como la evaluación sistemática de operaciones y controles para determinar si se siguen políticas aceptables, se cumplen normas, se usan eficientemente los recursos y se alcanzan los objetivos."},
  {s:"s1",t:"Sesión 1",q:"¿Cuál es la diferencia fundamental entre una auditoría de SI y una auditoría financiera?",opts:["A. La auditoría financiera es más costosa","B. La auditoría de SI evalúa el diseño del sistema de control interno y su eficacia; la financiera evalúa prácticas contables","C. Solo la auditoría financiera emite un informe final","D. La auditoría de SI no requiere evidencias objetivas"],c:1,exp:"La auditoría financiera evalúa si la organización cumple las prácticas contables. La auditoría de SI evalúa el diseño del sistema de control interno, eficacia, protocolos de seguridad y procesos de desarrollo."},
  {s:"s1",t:"Sesión 1",q:"Según Ron Weber (1988), ¿cuál es el propósito central de la auditoría informática?",opts:["A. Recoger, agrupar y evaluar evidencias para determinar si un sistema informático salvaguarda los activos","B. Revisar únicamente los estados financieros","C. Supervisar al personal del área de TI","D. Reducir los costos operativos de tecnología"],c:0,exp:"Ron Weber define la auditoría informática como el proceso de recoger, agrupar y evaluar evidencias para determinar si un sistema informático salvaguarda los activos de la organización."},
  {s:"s1",t:"Sesión 1",q:"¿Cuál de los siguientes NO es una característica de la auditoría informática?",opts:["A. Objetiva","B. Sistemática","C. Especulativa","D. Independiente"],c:2,exp:"Las características son: objetiva, sistemática, profesional, independiente, integral y periódica. La especulación no es una característica porque la auditoría se basa en evidencias verificables."},
  {s:"s1",t:"Sesión 1",q:"¿Qué es el Control Interno Informático (CI)?",opts:["A. El conjunto de medidas que garantiza el alineamiento de las TIC con el negocio en el día a día","B. Un tipo de auditoría externa especializada","C. El informe final de la auditoría informática","D. Un estándar internacional de auditoría"],c:0,exp:"El CI es el conjunto de medidas que la organización implementa para asegurar en el día a día el adecuado alineamiento de las TIC con el negocio y la eficacia y eficiencia."},
  {s:"s1",t:"Sesión 1",q:"¿Cuál es la principal diferencia entre el CI y la Auditoría Informática?",opts:["A. El CI analiza controles en el día a día e informa al Depto. de Informática; la AI analiza un momento determinado e informa a la Dirección General","B. Son exactamente lo mismo, solo cambia el nombre","C. La AI solo cubre aspectos financieros","D. El CI es realizado únicamente por personal externo"],c:0,exp:"El CI analiza controles en el día a día, informa al Departamento de Informática y su alcance es solo ese departamento. La AI analiza un momento informático determinado e informa a la Dirección General con cobertura total."},
  {s:"s1",t:"Sesión 1",q:"¿Cuáles son los 5 objetivos de la Auditoría de Sistemas?",opts:["A. Evaluar controles, identificar riesgos, recomendar mejoras, garantizar integridad de datos y cumplimiento normativo","B. Solo verificar el hardware y software","C. Emitir estados financieros y reducir costos","D. Supervisar al personal técnico y gestionar proyectos de TI"],c:0,exp:"Los cinco objetivos son: evaluar controles internos, identificar riesgos y vulnerabilidades, recomendar mejoras, garantizar la integridad y confiabilidad de los datos, y cumplimiento normativo y legal."},
  {s:"s1",t:"Sesión 1",q:"¿Cuál de los siguientes es un desafío actual de la Auditoría de Sistemas?",opts:["A. La escasez de papel para informes físicos","B. La evaluación de algoritmos de IA y la auditoría en la nube","C. El exceso de auditores disponibles en el mercado","D. La reducción del uso de tecnología en las empresas"],c:1,exp:"Los desafíos actuales incluyen: ciberseguridad, evolución tecnológica, Big Data y Analytics, auditoría en la nube y evaluación de algoritmos de IA."},
  {s:"s1",t:"Sesión 1",q:"El perfil del Auditor de Sistemas incluye pensamiento crítico y conocimiento de TI. ¿Qué otro aspecto se menciona explícitamente?",opts:["A. Habilidades de programación avanzada","B. Ética y responsabilidad profesional","C. Conocimientos en finanzas corporativas","D. Experiencia en marketing digital"],c:1,exp:"El perfil incluye: pensamiento crítico, conocimiento en auditoría, conocimiento multidisciplinario, experiencia en auditoría de sistemas, conocimiento de TI, independencia de criterio, responsabilidad profesional y ética."},
  {s:"s1",t:"Sesión 1",q:"Según la ISO, ¿qué son los activos de Sistemas de Información?",opts:["A. Únicamente el hardware de la organización","B. Todo aquello que una entidad considera valioso por contener, procesar o generar información necesaria para el negocio","C. Los estados financieros auditados","D. Los empleados del departamento de TI"],c:1,exp:"Según la ISO, un activo de SI es todo aquello que una entidad considera valioso por contener, procesar o generar información necesaria para el negocio."},
  {s:"s2",t:"Sesión 2",q:"¿Qué combinación de habilidades caracteriza al auditor de SI?",opts:["A. Habilidades contables y de marketing","B. Habilidades analíticas de un auditor combinadas con experiencia tecnológica de un profesional de TI","C. Habilidades en programación y diseño gráfico","D. Experiencia en gestión de RRHH y logística"],c:1,exp:"Un auditor de SI combina las habilidades analíticas de un auditor con la experiencia tecnológica de un profesional de TI o tecnología de la información."},
  {s:"s2",t:"Sesión 2",q:"Para garantizar la imparcialidad, ¿qué debe evitar el auditor?",opts:["A. Presentar informes por escrito","B. Cualquier vínculo con intereses de marcas, productos o equipos similares a los de su cliente","C. Comunicarse con el auditado durante el proceso","D. Utilizar herramientas de auditoría digitales"],c:1,exp:"Para garantizar la imparcialidad y el beneficio del auditado, el auditor debe evitar cualquier vínculo con intereses de marcas, productos o equipos similares a los de su cliente."},
  {s:"s2",t:"Sesión 2",q:"¿Cuáles son las cualidades del auditor según la Sesión 2?",opts:["A. Creatividad artística y liderazgo carismático","B. Integridad, imparcialidad, objetividad, conocimiento técnico, comunicación efectiva, confidencialidad y adaptabilidad","C. Rapidez, bajo costo y disponibilidad inmediata","D. Especialización exclusiva en seguridad informática"],c:1,exp:"Las cualidades del auditor son: Integridad, Imparcialidad, Objetividad (1), Conocimiento Técnico (2), Comunicación Efectiva (3), Confidencialidad (4) y Adaptabilidad (5)."},
  {s:"s2",t:"Sesión 2",q:"La Auditoría Integral se define como:",opts:["A. La revisión de registros contables de una empresa","B. Una evaluación amplia que un equipo multidisciplinario realiza sobre todas las actividades y operaciones de una empresa","C. La inspección física de inventarios almacenados","D. La evaluación exclusiva de los sistemas informáticos"],c:1,exp:"La Auditoría Integral implica una minuciosa y amplia evaluación que un equipo de profesionales multidisciplinarios realiza sobre todas las actividades y operaciones de una empresa."},
  {s:"s2",t:"Sesión 2",q:"¿Cuándo se solicita una Auditoría Externa?",opts:["A. Solo cuando la empresa tiene pérdidas financieras","B. Cuando hay indicios de riesgos en seguridad, preocupaciones sobre eficiencia de los SI u obligaciones legales","C. Cuando el personal interno no tiene tiempo","D. Exclusivamente cuando lo piden los accionistas"],c:1,exp:"La auditoría externa se solicita cuando se identifican indicios de riesgos en seguridad, preocupaciones sobre eficiencia de los sistemas, o cuando existen obligaciones legales."},
  {s:"s2",t:"Sesión 2",q:"¿Cuál es una ventaja de la Auditoría Interna frente a la Externa?",opts:["A. Mayor independencia del auditor","B. Conocimiento integral de la empresa, informe confidencial y sin costo adicional","C. Mayor credibilidad ante organismos reguladores","D. Opiniones que cumplen con exigencias legales externas"],c:1,exp:"Las ventajas de la auditoría interna son: anticipar problemas, informe interno y confidencial, no tiene costo adicional, y conocimiento integral de las actividades de la empresa."},
  {s:"s2",t:"Sesión 2",q:"¿Cuál es una desventaja de la Auditoría Interna?",opts:["A. Genera costos adicionales elevados","B. La opinión puede carecer de total imparcialidad y existe riesgo de encubrimiento","C. El auditor externo no conoce la empresa","D. Sus resultados no son válidos legalmente"],c:1,exp:"Las desventajas de la auditoría interna incluyen: la opinión puede carecer de imparcialidad, riesgo de encubrimiento, uso de técnicas similares y confiabilidad limitada."},
  {s:"s2",t:"Sesión 2",q:"La Auditoría Outsourcing se define como:",opts:["A. Una auditoría realizada por organismos gubernamentales","B. Un análisis especializado que evalúa la calidad del procesamiento de información que una empresa provee a otra","C. La revisión de inventarios físicos de una empresa","D. Una auditoría medioambiental"],c:1,exp:"La Auditoría Outsourcing es una revisión minuciosa que busca evaluar la calidad del procesamiento de información que una empresa provee a otra."},
  {s:"s3",t:"Sesión 3",q:"Según Piattini, Del Peso y Del Peso (2008), ¿qué determina la auditoría informática?",opts:["A. Si el personal está bien remunerado","B. Si un sistema informático protege activos, preserva integridad de datos, cumple objetivos y utiliza recursos eficientemente","C. El valor de mercado de los activos tecnológicos","D. La rentabilidad de las inversiones en TI"],c:1,exp:"Piattini et al. definen la auditoría informática como el proceso de recopilar, clasificar y evaluar pruebas para determinar si un sistema protege activos, preserva integridad, cumple objetivos y utiliza recursos eficientemente."},
  {s:"s3",t:"Sesión 3",q:"¿Cuál de las siguientes es una responsabilidad del Auditor de Sistemas?",opts:["A. Preparar informes financieros de la empresa","B. Verificar y evaluar el control interno de aplicaciones y sistemas informáticos, incluyendo periféricos","C. Contratar al personal de TI","D. Definir la estrategia comercial de la empresa"],c:1,exp:"Las responsabilidades del Auditor de Sistemas incluyen verificar el control interno, identificar vulnerabilidades, analizar integridad de información, gestionar riesgos y preparar informes detallados."},
  {s:"s3",t:"Sesión 3",q:"¿Cuál es la responsabilidad del Cliente en una auditoría?",opts:["A. Ejecutar las pruebas de auditoría junto al equipo auditor","B. Iniciar el procedimiento, definir el alcance, establecer quién audita, recibir el informe y determinar medidas a tomar","C. Preparar los papeles de trabajo de auditoría","D. Comunicar las no conformidades al auditado"],c:1,exp:"El Cliente tiene la responsabilidad de iniciar el procedimiento, definir el alcance, establecer quién audita, ser receptor del informe y determinar las medidas a tomar."},
  {s:"s3",t:"Sesión 3",q:"¿Qué responsabilidad tiene el Auditado?",opts:["A. Definir el alcance y contratar a los auditores","B. Brindar toda la colaboración, poner medios a disposición e implementar medidas correctivas","C. Preparar y presentar el informe final","D. Comunicar las no conformidades al equipo auditor"],c:1,exp:"El Auditado debe brindar colaboración a los auditores, informar a miembros clave, poner medios a disposición, colaborar con el equipo e implementar las medidas correctivas del informe."},
  {s:"s3",t:"Sesión 3",q:"¿Cuál es la responsabilidad principal del Auditor Jefe?",opts:["A. Solo redactar el informe final","B. Ser responsable final de todas las fases, preparar el plan, comunicar no conformidades, realizar seguimiento y dirigir el informe","C. Ejecutar las pruebas técnicas de auditoría","D. Contratar al equipo auditor externo"],c:1,exp:"El Auditor Jefe es responsable de todas las fases, debe preparar el plan, participar en la selección del equipo, comunicar no conformidades y realizar seguimiento de medidas correctivas."},
  {s:"s3",t:"Sesión 3",q:"¿Qué deben hacer los Auditores del equipo?",opts:["A. Definir el alcance y contratar al equipo","B. Preparar informe de hallazgos, colaborar con el equipo y Auditor Jefe, actuar con imparcialidad y cumplir requisitos","C. Ser los receptores del informe definitivo","D. Implementar las medidas correctivas de la auditoría"],c:1,exp:"Los auditores deben preparar el informe de hallazgos, registrar observaciones, colaborar con el equipo y el Auditor Jefe, actuar con imparcialidad y cumplir los requisitos de la auditoría."},
  {s:"s3",t:"Sesión 3",q:"¿Qué responsabilidad del auditor se relaciona con la continuidad operativa?",opts:["A. Preparar los estados financieros","B. Verificar el nivel de continuidad del negocio","C. Gestionar el presupuesto de TI","D. Diseñar la arquitectura de sistemas"],c:1,exp:"Una responsabilidad explícita del Auditor de Sistemas es verificar el nivel de continuidad del negocio, evaluando si la organización puede mantener operaciones ante eventos adversos."},
  {s:"s4",t:"Sesión 4",q:"¿Cómo se define la Ética según la Sesión 4?",opts:["A. El sistema de valores que una sociedad considera correcto o incorrecto","B. Una rama de la filosofía que se centra en comprender y analizar los principios morales que guían nuestras acciones","C. Un conjunto de normas vinculantes para profesionales","D. Las leyes y reglamentos que regulan una profesión"],c:1,exp:"La Ética es una rama de la filosofía que se centra en comprender y analizar los principios morales que guían nuestras acciones, ayudándonos a discernir lo correcto de lo incorrecto."},
  {s:"s4",t:"Sesión 4",q:"¿Cuál es la diferencia entre Ética y Moral?",opts:["A. Son exactamente lo mismo","B. La ética es filosófica, universal y reflexiva; la moral es cultural, contextual y práctica","C. La moral es más objetiva que la ética","D. La ética solo aplica en el trabajo y la moral en la vida personal"],c:1,exp:"La Ética es rama de la filosofía, universal, filosófica y reflexiva. La Moral es cultural y social, contextual y práctica. Aunque relacionadas, representan perspectivas distintas."},
  {s:"s4",t:"Sesión 4",q:"¿Qué es la Deontología?",opts:["A. Un tipo de auditoría especializada en sistemas","B. Una rama de la ética que estudia los deberes, obligaciones y normas morales que guían la conducta humana","C. El estudio de los estados financieros de una empresa","D. Un conjunto de habilidades técnicas para auditores"],c:1,exp:"La Deontología es una rama de la ética que se centra en el estudio de los deberes y obligaciones morales. Deriva del griego 'déon' (deber) y 'logía' (estudio de)."},
  {s:"s4",t:"Sesión 4",q:"¿Qué es la Deontología Profesional?",opts:["A. El estudio de la filosofía moral en general","B. Un conjunto de principios y reglas éticas que establecen normas y responsabilidades mínimas para los profesionales","C. La evaluación del desempeño financiero de los profesionales","D. Las leyes laborales que protegen a los trabajadores"],c:1,exp:"La Deontología Profesional es un conjunto de principios y reglas éticas que establecen las normas y responsabilidades mínimas que los profesionales deben cumplir en su ejercicio, asegurando una práctica ética y responsable."},
  {s:"s4",t:"Sesión 4",q:"¿Qué es un Código Deontológico?",opts:["A. Un manual de procedimientos técnicos de auditoría","B. Normas éticas con fuerza vinculante y mecanismos sancionadores, aprobado por colegios profesionales en consenso","C. Un contrato entre el auditor y el cliente","D. Una lista de herramientas de auditoría aprobadas"],c:1,exp:"El Código Deontológico son normas éticas que guían la conducta profesional, tienen fuerza vinculante con mecanismos sancionadores y son aprobados por los colegios profesionales en consenso."},
  {s:"s4",t:"Sesión 4",q:"¿Cuál es la principal diferencia entre Ética Profesional y Deontología Profesional?",opts:["A. Son sinónimos exactos","B. La ética profesional es más flexible y estudia los contenidos normativos; la deontología es el conjunto de normas vinculantes (menos flexible, entre moral y derecho)","C. La deontología es más flexible que la ética profesional","D. La ética profesional tiene fuerza legal vinculante y la deontología no"],c:1,exp:"La ética profesional es más flexible y puede aplicarse fuera del ámbito laboral. La deontología profesional es específica, menos flexible y se ubica entre la moral y el derecho."},
  {s:"s4",t:"Sesión 4",q:"¿Qué es un Dilema Ético?",opts:["A. Una situación ilegal que enfrenta el auditor","B. Una situación en la que se debe tomar una decisión difícil entre dos opciones, ambas con implicaciones morales","C. Un conflicto entre dos empresas auditadas","D. Una discrepancia en los estados financieros"],c:1,exp:"Un dilema ético es una situación en la que se debe tomar una decisión difícil entre dos opciones, ambas con implicaciones morales."},
  {s:"s4",t:"Sesión 4",q:"El Utilitarismo sostiene que:",opts:["A. Las acciones son correctas si benefician únicamente al individuo","B. Una acción es éticamente correcta si resulta en el mayor bienestar para la mayoría","C. Solo las acciones legales son éticas","D. El dinero es la medida de toda acción ética"],c:1,exp:"El Utilitarismo es la teoría ética que considera que una acción es éticamente correcta si resulta en el mayor bienestar para la mayoría, basándose en la utilidad o el beneficio neto."},
  {s:"s5",t:"Sesión 5",q:"¿Qué establece el Principio de Beneficio del Auditado?",opts:["A. Que el auditor debe maximizar sus propios ingresos","B. Que el auditor debe actuar en beneficio del cliente, velando por sus intereses y protegiendo sus activos","C. Que el auditado debe beneficiarse económicamente de la auditoría","D. Que los honorarios del auditor deben ser los más bajos posibles"],c:1,exp:"El Principio de Beneficio del Auditado establece que el auditor debe actuar en beneficio del cliente, cumpliendo sus responsabilidades de manera ética y buscando proteger los activos e integridad de la organización."},
  {s:"s5",t:"Sesión 5",q:"¿Qué implica el Principio de Cautela?",opts:["A. Ser extremadamente lento en la entrega de informes","B. Basar recomendaciones en experiencia contrastada, evitar predicciones excesivamente seguras y actuar con humildad","C. Nunca dar recomendaciones al auditado","D. Evitar el uso de tecnología en la auditoría"],c:1,exp:"El Principio de Cautela implica basar recomendaciones en experiencia contrastada, evitar predicciones excesivamente seguras sobre futuros tecnológicos y actuar con humildad."},
  {s:"s5",t:"Sesión 5",q:"¿Qué establece el Principio de Criterio Propio?",opts:["A. Que el auditor debe seguir siempre las instrucciones del cliente","B. Que el auditor debe mantener su criterio independiente ante oposición y negarse si sospecha uso indebido de la auditoría","C. Que el auditor debe aceptar cualquier método recomendado por terceros","D. Que el auditor nunca debe cuestionar las decisiones del auditado"],c:1,exp:"El Principio de Criterio Propio establece que el auditor debe mantener su criterio independiente, reflejar discrepancias y negarse si sospecha que la auditoría se usa para fines distintos a la mejora del sistema."},
  {s:"s5",t:"Sesión 5",q:"¿Qué prohíbe el Principio de Legalidad?",opts:["A. El uso de software de auditoría","B. El uso indebido de conocimientos y colaborar en violaciones legales como desactivar medidas de seguridad o acceder a información restringida","C. Trabajar con clientes del sector público","D. Revelar información del informe al directorio"],c:1,exp:"El Principio de Legalidad establece que el auditor debe evitar el uso indebido de sus conocimientos, no colaborar en violaciones legales y oponerse a cualquier intento de infracción."},
  {s:"s5",t:"Sesión 5",q:"¿Cuándo puede el auditor divulgar información del Principio de Secreto Profesional?",opts:["A. Cuando el cliente se lo solicite verbalmente","B. Solo cuando la ley lo requiera; la obligación es mantener en secreto la información obtenida durante la auditoría","C. Cuando otro auditor lo pida","D. Cuando la información sea de carácter técnico"],c:1,exp:"El Principio de Secreto Profesional impone la obligación de mantener en secreto la información obtenida, a menos que la ley lo requiera. Cualquier violación conlleva responsabilidad."},
  {s:"s5",t:"Sesión 5",q:"¿Qué implica el Principio de No Discriminación?",opts:["A. Que puede seleccionar clientes según su capacidad de pago","B. Que debe llevar a cabo su labor sin discriminación ni prejuicios, con igualdad de trato sin importar características personales, sociales o económicas","C. Que solo puede auditar empresas del mismo sector","D. Que debe dar trato preferencial a clientes frecuentes"],c:1,exp:"El Principio de No Discriminación establece que el auditor debe actuar sin discriminación ni prejuicios, manteniendo igualdad de trato en todas sus interacciones profesionales."},
  {s:"s5",t:"Sesión 5",q:"¿Qué establece el Principio de Libre Competencia?",opts:["A. Que el auditor puede cobrar cualquier precio","B. Que el auditor debe evitar prácticas colusorias y abusivas que restrinjan la competencia y perjudiquen a los auditados","C. Que el auditor puede usar información de la auditoría para competir con sus clientes","D. Que el auditor no debe competir con otros auditores"],c:1,exp:"El Principio de Libre Competencia establece que el auditor debe actuar evitando prácticas colusorias y abusivas, manteniendo conducta honesta en la comercialización de sus servicios."},
  {s:"s5",t:"Sesión 5",q:"¿Cuáles son las Normas Profesionales del Auditor?",opts:["A. Las leyes tributarias que debe conocer el auditor","B. Objetividad, compromiso, responsabilidad, integridad, honestidad, confidencialidad, equilibrio e institucionalidad","C. Los requisitos de titulación universitaria","D. Los aranceles establecidos por los colegios"],c:1,exp:"Las Normas Profesionales del Auditor incluyen: Objetividad, Compromiso, Responsabilidad, Integridad, Honestidad, Confidencialidad, Equilibrio e Institucionalidad."},
  {s:"s5",t:"Sesión 5",q:"¿Qué implica el Principio de Fortalecimiento y Respeto a la Profesión?",opts:["A. Cobrar los honorarios más altos del mercado","B. Exigir respeto, remuneración justa, evitar competencia desleal, promover colaboración y denunciar comportamientos indebidos","C. Trabajar exclusivamente para grandes empresas","D. No compartir conocimientos con otros auditores"],c:1,exp:"Este principio implica defender la profesión exigiendo respeto y remuneración justa, evitar competencia desleal, promover colaboración entre colegas y denunciar comportamientos indebidos."},
  {s:"lect",t:"Lecturas",q:"Según 'Etapas de la Auditoría', ¿cuál es el propósito de la etapa de Exploración?",opts:["A. Emitir el informe final","B. Realizar el estudio previo al inicio para conocer la entidad y obtener elementos para un adecuado planeamiento","C. Ejecutar las pruebas técnicas de los sistemas","D. Presentar los hallazgos al directorio"],c:1,exp:"La Exploración es el estudio previo al inicio de la auditoría para conocer en detalle las características de la entidad y obtener elementos necesarios para el planeamiento."},
  {s:"lect",t:"Lecturas",q:"En la etapa de Planeamiento, ¿qué debe contener como mínimo el plan global?",opts:["A. Solo el nombre del auditor jefe","B. Definición de temas y tareas, nombre de especialistas, y fecha prevista de inicio y terminación de cada tarea","C. Los estados financieros del período anterior","D. La lista de software a instalar"],c:1,exp:"El plan global debe contener como mínimo: definición de los temas y tareas, nombre de los especialistas que intervendrán y fecha prevista de inicio y terminación de cada tarea."},
  {s:"lect",t:"Lecturas",q:"¿Cuál es el propósito esencial de la etapa de Supervisión en la auditoría?",opts:["A. Reducir costos del proceso","B. Asegurar el cumplimiento de los objetivos de la auditoría y la calidad razonable del trabajo en todas las etapas","C. Contratar a los auditores externos","D. Aprobar el presupuesto"],c:1,exp:"La Supervisión asegura el cumplimiento de los objetivos y la calidad razonable del trabajo, necesaria en todas las etapas, desde la exploración hasta la emisión del informe."},
  {s:"lect",t:"Lecturas",q:"¿Qué es la Matriz de Evaluación en auditoría?",opts:["A. Un informe financiero resumido","B. Documento para recopilar información del área informática con escala de valoración del 1 (baja) al 5 (excelente)","C. Un contrato entre auditor y auditado","D. Una lista de verificación de hardware"],c:1,exp:"La Matriz de Evaluación es el documento para recopilar información sobre actividades del área informática, con escala de 1 (baja, deficiente) a 5 (superior, excelente) con criterios descriptivos."},
  {s:"lect",t:"Lecturas",q:"Según Ramírez y Álvarez, ¿cuáles son los dos aspectos básicos de la metodología de auditoría informática?",opts:["A. Evaluación financiera y análisis de personal","B. Identificación de áreas de riesgo e identificación de áreas de control","C. Revisión de hardware y revisión de software","D. Auditoría interna y auditoría externa"],c:1,exp:"Según Ramírez y Álvarez, la metodología considera dos aspectos básicos: la identificación de áreas de riesgo y la identificación de áreas de control."}
];

let filtered=[...Q], current=0, score=0, answered=false, userAnswers=[], view='setup', activeFilter='all';

function badgeClass(s){ return 'badge badge-'+s; }

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }

function setFilter(f){
  activeFilter=f;
  filtered=f==='all'?[...Q]:Q.filter(q=>q.s===f);
  renderSetup();
}

function startQuiz(rand){
  filtered=activeFilter==='all'?[...Q]:Q.filter(q=>q.s===activeFilter);
  if(rand) shuffle(filtered);
  current=0;score=0;answered=false;userAnswers=[];
  view='quiz';render();
}

function selectAnswer(idx){
  if(answered)return;
  answered=true;
  userAnswers[current]=idx;
  if(idx===filtered[current].c)score++;
  renderQuiz();
}

function nextQ(){
  if(current<filtered.length-1){current++;answered=userAnswers[current]!==undefined;render();}
  else{view='result';render();}
}
function prevQ(){if(current>0){current--;answered=userAnswers[current]!==undefined;render();}}
function restartSame(){current=0;score=0;answered=false;userAnswers=[];view='quiz';render();}
function goSetup(){view='setup';render();}

function renderSetup(){
  const total=Q.length;
  const byS={s1:0,s2:0,s3:0,s4:0,s5:0,lect:0};
  Q.forEach(q=>byS[q.s]++);
  const fLabels=[
    ['all',`Todas (${total})`],['s1',`Ses. 1 (${byS.s1})`],['s2',`Ses. 2 (${byS.s2})`],
    ['s3',`Ses. 3 (${byS.s3})`],['s4',`Ses. 4 (${byS.s4})`],['s5',`Ses. 5 (${byS.s5})`],
    ['lect',`Lecturas (${byS.lect})`]
  ];
  document.getElementById('app').innerHTML=`
    <div class="header">
      <div class="header-icon"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg></div>
      <div><div class="header-title">Deontología del Auditor</div><div class="header-sub">UTP — Unidad 1</div></div>
    </div>
    <div class="card">
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-num">${total}</div><div class="stat-lbl">Preguntas totales</div></div>
        <div class="stat-item"><div class="stat-num">5</div><div class="stat-lbl">Sesiones</div></div>
        <div class="stat-item"><div class="stat-num">9</div><div class="stat-lbl">PDFs base</div></div>
      </div>
      <div class="section-label">Filtrar por tema</div>
      <div class="filter-wrap">
        ${fLabels.map(([k,l])=>`<button class="filter-btn ${activeFilter===k?'active':''}" onclick="setFilter('${k}')">${l}</button>`).join('')}
      </div>
      <div class="section-label">Comenzar quiz (${filtered.length} preguntas)</div>
      <button class="btn primary" onclick="startQuiz(false)">En orden del curso</button>
      <button class="btn outline-purple" onclick="startQuiz(true)">Orden aleatorio</button>
    </div>`;
}

function renderQuiz(){
  const q=filtered[current];
  const pct=Math.round((current/filtered.length)*100);
  const optsHTML=q.opts.map((o,i)=>{
    let cls='opt';
    if(answered){
      if(i===q.c)cls+=' show-correct';
      else if(userAnswers[current]===i)cls+=' wrong';
    }
    return `<button class="${cls}" ${answered?'disabled':''} onclick="selectAnswer(${i})">${o}</button>`;
  }).join('');
  const isLast=current===filtered.length-1;
  const wasCorrect=answered&&userAnswers[current]===q.c;
  document.getElementById('app').innerHTML=`
    <div class="header">
      <div class="header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="fill:none;stroke:#534AB7;width:18px;height:18px"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></div>
      <div style="flex:1"><div class="prog-label"><span>${current+1} de ${filtered.length}</span><span>${score} correctas</span></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>
    </div>
    <div class="card">
      <span class="${badgeClass(q.s)}">${q.t}</span>
      <div class="q-text">${q.q}</div>
      ${optsHTML}
      ${answered?`<div class="feedback ${wasCorrect?'ok':'fail'}">${wasCorrect?'Correcto. ':'Incorrecto. '}${q.exp}</div>`:''}
      ${answered?`<button class="btn primary" onclick="nextQ()">${isLast?'Ver resultados':'Siguiente'} &rarr;</button>`:''}
      ${current>0&&!answered?`<button class="btn" onclick="prevQ()">&larr; Anterior</button>`:''}
      ${current>0&&answered&&!isLast?`<button class="btn" onclick="prevQ()" style="margin-top:0">&larr; Anterior</button>`:''}
    </div>`;
}

function renderResult(){
  const total=filtered.length;
  const pct=Math.round((score/total)*100);
  let msgCls,msgTxt;
  if(pct>=90){msgCls='msg-great';msgTxt='Excelente dominio del curso.';}
  else if(pct>=75){msgCls='msg-good';msgTxt='Muy bien. Repasa los temas en que fallaste.';}
  else if(pct>=60){msgCls='msg-ok';msgTxt='Aprobado, pero hay temas por reforzar.';}
  else{msgCls='msg-low';msgTxt='Necesitas repasar los materiales con más detalle.';}

  const breakdown={};
  filtered.forEach((q,i)=>{
    if(!breakdown[q.s])breakdown[q.s]={t:q.t,total:0,ok:0};
    breakdown[q.s].total++;
    if(userAnswers[i]===q.c)breakdown[q.s].ok++;
  });

  const bkHTML=Object.values(breakdown).map(b=>`
    <div class="bk-item">
      <div class="bk-label">${b.t}</div>
      <div class="bk-val">${b.ok}/${b.total}</div>
    </div>`).join('');

  const wrongItems=filtered.map((q,i)=>({q,ua:userAnswers[i],i})).filter(x=>x.ua!==x.q.c);
  const wrongHTML=wrongItems.length===0?'<p style="font-size:14px;color:var(--text-muted);text-align:center;padding:12px 0">Sin errores. Perfecto.</p>':
    wrongItems.map(x=>`
      <div class="review-item">
        <div class="review-q">${x.q.q}</div>
        <div class="review-ans">Tu respuesta: ${x.q.opts[x.ua]??'(sin responder)'}<br><span class="review-correct">Correcta: ${x.q.opts[x.q.c]}</span></div>
      </div>`).join('');

  document.getElementById('app').innerHTML=`
    <div class="header">
      <div class="header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2" style="fill:none;width:18px;height:18px"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
      <div><div class="header-title">Resultados</div><div class="header-sub">Quiz completado</div></div>
    </div>
    <div class="card" style="text-align:center">
      <div class="score-circle"><div class="score-big">${score}/${total}</div><div class="score-pct">${pct}%</div></div>
      <div class="${msgCls} msg-box">${msgTxt}</div>
      <div class="section-label" style="text-align:left">Por sesión</div>
      <div class="breakdown-grid">${bkHTML}</div>
      <div class="btn-row">
        <button class="btn primary" onclick="restartSame()">Repetir</button>
        <button class="btn outline-purple" onclick="goSetup()">Cambiar tema</button>
      </div>
    </div>
    ${wrongItems.length>0?`<div class="review-section"><div class="review-title">Preguntas para repasar (${wrongItems.length})</div>${wrongHTML}</div>`:''}`;
}

function render(){
  if(view==='setup')renderSetup();
  else if(view==='quiz')renderQuiz();
  else renderResult();
}

render();
</script>
</body>
</html>
